<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تربية بلس - لأن ما في manual. نصائح تربوية تجمع بين القيم الإسلامية والعلم الحديث">
    <title>تربية بلس - قريباً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .tagline {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.95;
        }

        .coming-soon {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .coming-soon h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .coming-soon p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            line-height: 1.6;
            opacity: 0.9;
        }

        .emoji {
            font-size: clamp(3rem, 10vw, 5rem);
            margin-bottom: 1rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 10px;
            }

            .coming-soon {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🌱</span>
        <h1>تربية بلس</h1>
        <p class="tagline">لأن ما في manual</p>

        <div class="coming-soon">
            <h2>قريباً...</h2>
            <p>نحن نحضّر لكم مساحة دافئة لنصائح تربوية تجمع بين القيم الإسلامية وعلم التربية الحديث</p>
        </div>

        <footer>
            <p>tarbiyaplus.com</p>
        </footer>
    </div>
</body>
</html>
